kind = "web"
previewPath = "/"
title = "The Simulator of Life"
version = "1.0.0"
id = "artifacts/the-simulator-of-life"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24504

[services.development]
run = "pnpm --filter @workspace/the-simulator-of-life run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/the-simulator-of-life", "run", "build" ]
publicDir = "artifacts/the-simulator-of-life/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24504"
BASE_PATH = "/"
