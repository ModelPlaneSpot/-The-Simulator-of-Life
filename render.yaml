services:
  - type: web
    name: the-simulator-of-life
    runtime: static
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
