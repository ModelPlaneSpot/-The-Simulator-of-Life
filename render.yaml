services:
  - type: web
    name: the-simulator-of-life
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 22.22.1
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
